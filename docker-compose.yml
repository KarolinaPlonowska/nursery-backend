version: "3.8"

services:
  backend:
    build:
      context: ./backend # Budujemy obraz z katalogu backend/
      dockerfile: Dockerfile
    container_name: backend-container
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./backend:/app # Mapowanie folderu backend/ do kontenera
      - /app/node_modules # Nie kopiujemy node_modules

  postgres:
    image: postgres:latest
    container_name: postgres-container
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nursery
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
