services:
  # Backend API
  - type: web
    name: nursery-backend
    runtime: node
    branch: master
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nursery-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: nursery-frontend
          property: host
      - key: EMAIL_HOST
        value: sandbox.smtp.mailtrap.io
      - key: EMAIL_PORT
        value: 2525
      - key: EMAIL_SECURE
        value: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
    healthCheckPath: /

  # Frontend Static Site
  - type: web
    name: nursery-frontend
    runtime: static
    branch: master
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nursery-backend
          property: host

# Baza danych PostgreSQL
databases:
  - name: nursery-db
    databaseName: nursery_db
    user: nursery_user
    plan: free